<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AR Dance</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <video id="cameraVideo" autoplay muted playsinline webkit-playsinline></video>
  <div id="topBirthdayBanner" aria-hidden="true">Happy Birthday</div>
  <button id="startButton" aria-label="start">开始</button>
  <div id="statusText"></div>

  <script>
    (function () {
      var button = document.getElementById('startButton');
      function requestStart(e) {
        if (e && e.preventDefault) e.preventDefault();
        document.body.classList.add('ar-started');
        if (window.startARExperience) {
          window.startARExperience();
        } else {
          window.AR_PENDING_START = true;
        }
      }
      button.addEventListener('click', requestStart, { passive: false });
      button.addEventListener('touchend', requestStart, { passive: false });
    })();
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
