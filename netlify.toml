[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self), fullscreen=(self), xr-spatial-tracking=(self)"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"
    Cache-Control = "public, max-age=31536000, immutable"
